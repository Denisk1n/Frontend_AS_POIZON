


<div class="product_card" (click)="goToSneakerInfo()">
      <img [src]="product.main_image">
      <div class="card_info">
         <span id="card_brand"> {{ product.brand }} </span>
         <h5 id="card_title"> {{product.title}}</h5>
         <h4 id="card_price"> {{product.price}} ₽</h4>
         <p-tag [value]="product.available" [severity]="getSeverity(product.available)"></p-tag>
      </div>
</div>
