
   <section class="page" >

      <div class="path">
            <div class="small-path">
               <a href="/"> Главная</a>
               <span> -> </span>
               <a href="/sneakers"> Обувь </a>
               <span> -> </span>
               <span id="small-path-name"> {{product.title}} </span>
            </div>   
      </div>
      <hr>
      
      <section class="main"> 
      
         <app-image-slider [images]="images"> </app-image-slider>

         <div class="pro-details">

            <h2 >{{ product.title }}</h2>
            
            <div class="info">

               <div class="info-line">
                  <div>
                     <h6> Бренд: </h6> 
                  </div>
                  <span> {{ product.brand }} </span>
               </div>

               <div class="info-line">
                  <div>
                     <h6> Категория:   </h6> 
                  </div>
                  <span> {{ product.category }} </span>
               </div>

               <div class="info-line">
                  <div>
                     <h6> Наличие: </h6> 
                  </div>
                  <span class="available" [ngStyle]="{'color': product.available == 'В наличии' ? 'green' : 'red'}" > {{ product.available}} </span>
               </div>

            </div>

            <h4> {{ product.price }} ₽ </h4>
            
            <select name="" id="" class="sizes" >
               <option value=""> Выберите размер </option>
               <option value="" *ngFor="let size of product.sizes"> 
                                {{ size.ru }} RU
                                {{ size.us }} US
                                {{ size.sm }} СМ
                </option>
            </select>
            
            <button class="add-to-cart"> <i class="fa-solid fa-bag-shopping"></i>Добавить в корзину </button>

            
         </div>
      
      </section>

      
      <section class="recomended">

         <div class="rec-text">
            <h2> Рекомендуем </h2>
            <app-products-list [productCards] = "recomendedProducts"> </app-products-list>
         </div>

         
         
      </section>

   </section>
